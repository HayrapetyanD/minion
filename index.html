<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minion</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <div class="container">
        <div class="char_box">
            <div class="char_left_heand">
                <div class="char_left_heand_parts">
                    <div class="char_left_heand_top"></div>
                    <div class="char_left_heand_bottom"></div>
                </div>
                <div class="char_left_hand_glove">
                    <div class="char_left_hand_box"></div>
                    <div class="char_left_hand_circle1"></div>
                    <div class="char_left_hand_circle2"></div>
                    <div class="char_left_hand_circle3"></div>
                </div>
            </div>
            <div class="char_body">
                <div class="char_body_top">
                    <div class="char_hair_box">
                        <div class="char_hair_left_box">
                            <div class="char_left_hair1"></div>
                            <div class="char_left_hair2"></div>
                            <div class="char_left_hair3"></div>
                            <div class="char_left_hair4"></div>
                        </div>
                        <div class="char_hair_rigth_box">
                            <div class="char_rigth_hair4"></div>
                            <div class="char_rigth_hair3"></div>
                            <div class="char_rigth_hair2"></div>
                            <div class="char_rigth_hair1"></div>
                        </div>
                    </div>
                    <div class="char_glasses">
                        <div class="left_glass_strap"></div>
                        <div class="left_glass_part"></div>
                        <div class="left_glass">
                            <div class="left_eye_white">
                                <div class="left_eye_brown">
                                    <div class="left_eye_black"></div>
                                    <div class="left_eye_shin"></div>
                                </div>
                            </div>
                        </div>
                        <div class="rigth_glass">
                            <div class="rigth_eye_white">
                                <div class="rigth_eye_brown">
                                    <div class="rigth_eye_black"></div>
                                    <div class="rigth_eye_shin"></div>
                                </div>
                            </div>
                        </div>
                        <div class="rigth_glass_part"></div>
                        <div class="rigth_glass_strap"></div>
                    </div>
                    <div class="char_smile_box">
                        <div class="char_smile"></div>
                    </div>
                </div>
                <div class="char_body_bottom">
                    <div class="char_overalls_box">
                        <div class="char_overalls_main_circle"></div>
                        <div class="char_overalls_main">
                            <div class="char_overrals_strap_left"></div>
                            <div class="char_overalls_button_left"></div>
                            <div class="char_overalls_pocket_circle"></div>
                            <div class="char_overalls_pocket"></div>
                            <div class="char_overrals_strap_right"></div>
                            <div class="char_overalls_button_rigth"></div>
                        </div>
                        <div class="char_overalls_bottom">
                            <div class="char_overalls_bottom_circle"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="char_rigth_heand">
                <div class="char_rigth_heand_parts">
                    <div class="char_rigth_heand_top"></div>
                    <div class="char_rigth_heand_bottom"></div>
                </div>
                <div class="char_rigth_hand_glove">
                    <div class="char_rigth_hand_box"></div>
                    <div class="char_rigth_hand_circle1"></div>
                    <div class="char_rigth_hand_circle2"></div>
                    <div class="char_rigth_hand_circle3"></div>
                </div>
            </div>
            <div class="char_legs">
                <div class="char_left_leg">
                    <div class="char_left_pants"></div>
                    <div class="char_left_shoe"></div>
                </div>
                <div class="char_rigth_leg">
                    <div class="char_rigth_pants"></div>
                    <div class="char_rigth_shoe"></div>
                </div>
            </div>
        </div>   
    </div>
</body>
</html>
